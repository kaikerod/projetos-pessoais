<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Sistema de Análise de Vendas — Dashboard para gerenciar e analisar vendas de produtos.">
  <title>Análise de Vendas — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ─────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1a2747;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, .35);
      --accent-secondary: #00d2ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9a9ab0;
      --text-muted: #6b6b80;
      --success: #00e676;
      --warning: #ffab40;
      --danger: #ff5252;
      --border: rgba(255, 255, 255, .06);
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0, 0, 0, .35);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Layout ───────────────────────────────── */
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown .6s ease;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-secondary);
      font-size: .95rem;
      margin-top: .35rem;
    }

    /* ─── Cards Grid ───────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      animation: fadeUp .5s ease both;
    }

    .metric-card:nth-child(1) {
      animation-delay: .05s;
    }

    .metric-card:nth-child(2) {
      animation-delay: .1s;
    }

    .metric-card:nth-child(3) {
      animation-delay: .15s;
    }

    .metric-card:nth-child(4) {
      animation-delay: .2s;
    }

    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
      border-color: rgba(108, 99, 255, .25);
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .metric-card:nth-child(1)::before {
      background: linear-gradient(90deg, #6c63ff, #7c74ff);
    }

    .metric-card:nth-child(2)::before {
      background: linear-gradient(90deg, #00d2ff, #00e5ff);
    }

    .metric-card:nth-child(3)::before {
      background: linear-gradient(90deg, #00e676, #69f0ae);
    }

    .metric-card:nth-child(4)::before {
      background: linear-gradient(90deg, #ffab40, #ffd740);
    }

    .metric-card .label {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: .5rem;
    }

    .metric-card .value {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .metric-card .icon {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      font-size: 1.6rem;
      opacity: .25;
    }

    /* ─── Sections ─────────────────────────────── */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow);
      animation: fadeUp .5s ease both;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .section-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* ─── Form ─────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 1rem;
      align-items: end;
    }

    .form-group label {
      display: block;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: .4rem;
    }

    .form-group input {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      padding: .7rem 1.5rem;
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, opacity .2s;
    }

    .btn:active {
      transform: scale(.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b83ff);
      color: #fff;
      box-shadow: 0 4px 18px var(--accent-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px var(--accent-glow);
      opacity: .92;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, .06);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, .1);
    }

    /* ─── Filter ───────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 1rem;
      align-items: end;
      margin-bottom: 1.25rem;
    }

    .filter-row .form-group {
      flex: 1;
      max-width: 280px;
    }

    /* ─── Table ─────────────────────────────────── */
    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: .75rem 1rem;
      text-align: left;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      transition: background .15s;
    }

    tbody tr:hover {
      background: rgba(108, 99, 255, .04);
    }

    tbody td {
      padding: .85rem 1rem;
      font-size: .9rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    tbody td:first-child {
      color: var(--text-primary);
      font-weight: 500;
    }

    .badge {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-valor {
      background: rgba(108, 99, 255, .12);
      color: #a5a0ff;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .emoji {
      font-size: 2rem;
      margin-bottom: .5rem;
    }

    /* ─── Toast ─────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 500;
      color: #fff;
      z-index: 1000;
      transform: translateY(120%);
      opacity: 0;
      transition: transform .35s ease, opacity .35s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-success {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #0a2e1a;
    }

    .toast-error {
      background: linear-gradient(135deg, #d50000, #ff5252);
    }

    /* ─── Animations ───────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Responsive ───────────────────────────── */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .filter-row {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-row .form-group {
        max-width: 100%;
      }

      header h1 {
        font-size: 1.5rem;
      }

      .metric-card .value {
        font-size: 1.35rem;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header>
      <h1>📊 Análise de Vendas</h1>
      <p>Dashboard de gerenciamento e análise de vendas</p>
    </header>

    <!-- Metrics -->
    <section class="metrics" id="metrics">
      <div class="metric-card">
        <span class="icon">💰</span>
        <div class="label">Total de Vendas</div>
        <div class="value" id="totalVendas">R$ 0,00</div>
      </div>
      <div class="metric-card">
        <span class="icon">📦</span>
        <div class="label">Qtd. de Vendas</div>
        <div class="value" id="qtdVendas">0</div>
      </div>
      <div class="metric-card">
        <span class="icon">🏆</span>
        <div class="label">Mais Vendido</div>
        <div class="value" id="maisVendido">—</div>
      </div>
      <div class="metric-card">
        <span class="icon">💎</span>
        <div class="label">Mais Lucrativo</div>
        <div class="value" id="maisLucrativo">—</div>
      </div>
    </section>

    <!-- Add Sale -->
    <section class="section" style="animation-delay: .25s;">
      <h2 class="section-title"><span class="dot"></span> Nova Venda</h2>
      <form id="formVenda" class="form-grid">
        <div class="form-group">
          <label for="produto">Produto</label>
          <input type="text" id="produto" placeholder="Ex: Notebook" required>
        </div>
        <div class="form-group">
          <label for="valor">Valor (R$)</label>
          <input type="number" id="valor" step="0.01" min="0" placeholder="0,00" required>
        </div>
        <div class="form-group">
          <label for="dataVenda">Data</label>
          <input type="date" id="dataVenda" required>
        </div>
        <button type="submit" class="btn btn-primary">Adicionar</button>
      </form>
    </section>

    <!-- Sales List -->
    <section class="section" style="animation-delay: .3s;">
      <h2 class="section-title"><span class="dot"></span> Vendas Registradas</h2>

      <form id="formFiltro" class="filter-row">
        <div class="form-group">
          <label for="filtroValor">Filtrar acima de (R$)</label>
          <input type="number" id="filtroValor" step="0.01" min="0" placeholder="Ex: 1000">
        </div>
        <button type="submit" class="btn btn-primary" id="btnFiltrar">Filtrar</button>
        <button type="button" class="btn btn-secondary" id="btnLimpar">Limpar</button>
      </form>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Valor</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="tabelaVendas">
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── Helpers ─────────────────────────────────────
    const $ = (sel) => document.querySelector(sel);
    const formatBRL = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    function showToast(msg, type = 'success') {
      const t = $('#toast');
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ─── API ────────────────────────────────────────
    async function fetchAnalise() {
      try {
        const res = await fetch('/api/analise');
        const d = await res.json();
        $('#totalVendas').textContent = formatBRL(d.total_vendas);
        $('#qtdVendas').textContent = d.quantidade_vendas;
        $('#maisVendido').textContent = d.produto_mais_vendido || '—';
        $('#maisLucrativo').textContent = d.produto_mais_lucrativo || '—';
      } catch (e) {
        console.error('Erro ao carregar análise:', e);
      }
    }

    async function fetchVendas(valorMinimo = null) {
      try {
        let url = '/api/vendas';
        if (valorMinimo !== null && valorMinimo !== '') {
          url = `/api/vendas/filtro?valor_minimo=${valorMinimo}`;
        }
        const res = await fetch(url);
        const vendas = await res.json();
        renderTabela(vendas);
      } catch (e) {
        console.error('Erro ao carregar vendas:', e);
      }
    }

    function renderTabela(vendas) {
      const tbody = $('#tabelaVendas');
      if (!vendas.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="3">
              <div class="empty-state">
                <div class="emoji">📭</div>
                <p>Nenhuma venda encontrada</p>
              </div>
            </td>
          </tr>`;
        return;
      }
      tbody.innerHTML = vendas.map(v => `
        <tr>
          <td>${v.produto}</td>
          <td><span class="badge badge-valor">${formatBRL(v.valor)}</span></td>
          <td>${v.data_venda}</td>
        </tr>
      `).join('');
    }

    // ─── Events ─────────────────────────────────────
    $('#formVenda').addEventListener('submit', async (e) => {
      e.preventDefault();
      const produto = $('#produto').value.trim();
      const valor = parseFloat($('#valor').value);
      const dataVenda = $('#dataVenda').value;

      if (!produto || isNaN(valor) || !dataVenda) {
        showToast('Preencha todos os campos!', 'error');
        return;
      }

      try {
        const res = await fetch('/api/vendas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ produto, valor, data_venda: dataVenda })
        });

        if (res.ok) {
          showToast('Venda adicionada com sucesso! ✅');
          $('#formVenda').reset();
          fetchVendas();
          fetchAnalise();
        } else {
          const err = await res.json();
          showToast(err.erro || 'Erro ao adicionar venda', 'error');
        }
      } catch (e) {
        showToast('Erro de conexão', 'error');
      }
    });

    $('#formFiltro').addEventListener('submit', (e) => {
      e.preventDefault();
      const val = $('#filtroValor').value;
      fetchVendas(val || null);
    });

    $('#btnLimpar').addEventListener('click', () => {
      $('#filtroValor').value = '';
      fetchVendas();
    });

    // ─── Init ───────────────────────────────────────
    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    $('#dataVenda').value = today;

    fetchAnalise();
    fetchVendas();
  </script>
</body>

</html>
